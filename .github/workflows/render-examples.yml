name: Render example presentations

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::rmarkdown
            any::xaringan
            any::xaringanExtra

      - name: Install TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install LaTeX packages
        run: |
          tinytex::tlmgr_install(c(
            "beamer", "pgf", "tikz-cd", "etoolbox", "xifthen",
            "textpos", "helvet", "fira", "fontspec", "booktabs",
            "biblatex", "biber", "mdframed", "fancyvrb"
          ))
        shell: Rscript {0}

      - name: Render beamer example
        run: |
          dir.create("_site/bips-beamer", recursive = TRUE)
          # Copy skeleton files to temp dir and render there
          skeleton <- "inst/rmarkdown/templates/beamer/skeleton"
          tmp <- tempdir()
          file.copy(list.files(skeleton, full.names = TRUE), tmp, recursive = TRUE)
          rmarkdown::render(
            file.path(tmp, "skeleton.Rmd"),
            output_file = "bips-beamer.pdf",
            output_dir = "_site/bips-beamer"
          )
        shell: Rscript {0}

      - name: Render xaringan example
        run: |
          dir.create("_site/bips-xaringan", recursive = TRUE)
          skeleton <- "inst/rmarkdown/templates/xaringan/skeleton"
          tmp <- file.path(tempdir(), "xaringan")
          dir.create(tmp)
          file.copy(list.files(skeleton, full.names = TRUE), tmp, recursive = TRUE)
          # Also copy resources
          resources <- "inst/rmarkdown/templates/xaringan/resources"
          file.copy(list.files(resources, full.names = TRUE), tmp)
          rmarkdown::render(
            file.path(tmp, "skeleton.Rmd"),
            output_file = "index.html",
            output_dir = "_site/bips-xaringan"
          )
          # Copy libs for self-contained xaringan
          libs_dir <- file.path(tmp, "libs")
          if (dir.exists(libs_dir)) {
            file.copy(libs_dir, "_site/bips-xaringan", recursive = TRUE)
          }
        shell: Rscript {0}

      - name: Create index page
        run: |
          touch _site/.nojekyll
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>bipsdown examples</title></head>
          <body>
          <h1>bipsdown example presentations</h1>
          <ul>
            <li><a href="bips-beamer/bips-beamer.pdf">Beamer (PDF)</a></li>
            <li><a href="bips-xaringan/">xaringan (HTML)</a></li>
          </ul>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
