name: Render example presentations

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
          dependencies: '"all"'

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Install LaTeX packages
        run: |
          tinytex::tlmgr_install(c(
            "beamer", "pgf", "etoolbox", "xifthen", "textpos",
            "helvet", "fira", "fontspec", "booktabs", "amsmath",
            "fancyvrb", "framed", "tikzfill"
          ))
        shell: Rscript {0}

      - name: Render beamer example
        run: |
          dir.create("_site/bips-beamer", recursive = TRUE)
          rmarkdown::render(
            "inst/rmarkdown/templates/beamer/skeleton/skeleton.Rmd",
            output_file = "bips-beamer.pdf",
            output_dir = normalizePath("_site/bips-beamer")
          )
        shell: Rscript {0}

      - name: Render xaringan example
        run: |
          dir.create("_site/bips-xaringan", recursive = TRUE)
          rmarkdown::render(
            "inst/rmarkdown/templates/xaringan/skeleton/skeleton.Rmd",
            output_file = "index.html",
            output_dir = normalizePath("_site/bips-xaringan")
          )
          # Copy xaringan libs if not self-contained
          libs <- "inst/rmarkdown/templates/xaringan/skeleton/libs"
          if (dir.exists(libs)) {
            file.copy(libs, "_site/bips-xaringan", recursive = TRUE)
          }
        shell: Rscript {0}

      - name: Create index page
        run: |
          touch _site/.nojekyll
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>bipsdown examples</title></head>
          <body>
          <h1>bipsdown example presentations</h1>
          <ul>
            <li><a href="bips-beamer/bips-beamer.pdf">Beamer (PDF)</a></li>
            <li><a href="bips-xaringan/">xaringan (HTML)</a></li>
          </ul>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
